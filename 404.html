<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="canonical" href="https://www.lavaletteboutique.com/">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#B89970;--warm:#F2EDE2;--bg:#0C0B09}
    html,body{height:100%;background:var(--bg);color:var(--warm);font-family:'Inter Tight',sans-serif}
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center}
    .logo{margin-bottom:48px;opacity:.7}
    .logo img{height:72px;width:auto}
    .code{font-family:'Cormorant Garamond',serif;font-size:clamp(72px,15vw,120px);font-weight:300;color:var(--gold);opacity:.35;line-height:1;letter-spacing:-.02em}
    .heading{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,4vw,32px);font-weight:400;font-style:italic;color:var(--warm);margin:16px 0 12px}
    .sub{font-family:'Inter Tight',sans-serif;font-size:.75rem;letter-spacing:.12em;color:rgba(242,237,226,.45);text-transform:uppercase;margin-bottom:40px}
    .rule{width:40px;height:1px;background:rgba(184,153,112,.3);margin:0 auto 40px}
    .links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:48px}
    .links a{font-family:'Inter Tight',sans-serif;font-size:.5rem;font-weight:500;letter-spacing:.28em;text-transform:uppercase;padding:10px 22px;border:1px solid rgba(184,153,112,.3);color:rgba(242,237,226,.6);text-decoration:none;transition:all .3s}
    .links a:hover{border-color:var(--gold);color:var(--gold)}
    .links a.primary{border-color:var(--gold);color:var(--gold)}
    .links a.primary:hover{background:var(--gold);color:var(--bg)}
  </style>
</head>
<body>
  <a href="/" class="logo" aria-label="La Valette Boutique — Home">
    <img src="/logo.svg" alt="La Valette Boutique">
  </a>
  <div class="code" aria-hidden="true">404</div>
  <h1 class="heading">Page not found</h1>
